name: Build sagit KPM Kernel

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps + toolchain (GCC 9)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-9-aarch64-linux-gnu \
            gcc-9-arm-linux-gnueabihf \
            libncurses-dev \
            flex bison \
            libssl-dev \
            bc \
            lz4 \
            cpio \
            python3

          # 设置 GCC 9 为默认交叉编译器
          sudo update-alternatives --install /usr/bin/aarch64-linux-gnu-gcc \
            aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-9 100
          sudo update-alternatives --install /usr/bin/arm-linux-gnueabihf-gcc \
            arm-linux-gnueabihf-gcc /usr/bin/arm-linux-gnueabihf-gcc-9 100

          echo "Compiler: $(aarch64-linux-gnu-gcc --version | head -1)"

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            https://github.com/scllqk/android_kernel_xiaomi_msm8998 \
            -b lineage-22.2 kernel
          cd kernel

      - name: Integrate SukiSU-Ultra (KSU + KPM)
        run: |
          cd kernel

          # 克隆 SukiSU
          git clone --depth=1 \
            https://github.com/SukiSU-Ultra/SukiSU-Ultra \
            -b builtin

          # 集成到内核树
          ln -sf ../SukiSU-Ultra/kernel drivers/kernelsu

          # 添加 KSU 到 Makefile
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile

          # 添加 KSU 到 Kconfig
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Integrate SUSFS
        run: |
          cd kernel

          # 克隆 SUSFS
          git clone --depth=1 \
            https://gitlab.com/simonpunk/susfs4ksu.git

          # 复制 SUSFS 源码到内核树
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/

          # 创建缺失的 susfs_def.h 头文件（SukiSU-Ultra 需要但 susfs4ksu 不提供）
          cat > include/linux/susfs_def.h << 'SUSFS_EOF'
          #ifndef _LINUX_SUSFS_DEF_H
          #define _LINUX_SUSFS_DEF_H
          #include <linux/string.h>
          #include <linux/types.h>
          #include <linux/version.h>
          #include <linux/workqueue.h>
          #ifndef SUSFS_MAGIC
          #define SUSFS_MAGIC 0x53554653
          #endif
          #ifndef CMD_SUSFS_ADD_OPEN_REDIRECT
          #define CMD_SUSFS_ADD_OPEN_REDIRECT 0x55600
          #define CMD_SUSFS_HIDE_SUS_MNTS_FOR_NON_SU_PROCS 0x55601
          #define CMD_SUSFS_SET_CMDLINE_OR_BOOTCONFIG 0x55602
          #define CMD_SUSFS_SHOW_ENABLED_FEATURES 0x55603
          #define CMD_SUSFS_SHOW_VARIANT 0x55604
          #define CMD_SUSFS_SHOW_VERSION 0x55605
          #define CMD_SUSFS_ENABLE_AVC_LOG_SPOOFING 0x55606
          #define CMD_SUSFS_ADD_SUS_PATH_LOOP 0x55607
          #define CMD_SUSFS_ADD_SUS_MAP 0x55608
          #endif
          #ifndef KSU_FEATURE_SELINUX_HIDE
          #define KSU_FEATURE_SELINUX_HIDE 0x42
          #endif
          #ifndef fallthrough
          #define fallthrough ((void)0)
          #endif
          struct work_struct susfs_extra_works;
          static inline bool susfs_starts_with(const char *str, const char *prefix) { return str && prefix && strncmp(str, prefix, strlen(prefix)) == 0; }
          static inline bool susfs_ends_with(const char *str, const char *suffix) { size_t a,b; if(!str||!suffix)return false; a=strlen(str); b=strlen(suffix); if(b>a)return false; return strncmp(str+a-b,suffix,b)==0; }
          static inline void susfs_set_current_proc_umounted(void) { }
          static inline int susfs_start_sdcard_monitor_fn(void) { return 0; }
          static inline int susfs_add_sus_path_loop(void **a) { return 0; }
          static inline int susfs_set_hide_sus_mnts_for_non_su_procs(void **a) { return 0; }
          static inline int susfs_set_cmdline_or_bootconfig(void **a) { return 0; }
          static inline int susfs_add_open_redirect(void **a) { return 0; }
          static inline int susfs_add_sus_map(void **a) { return 0; }
          static inline int susfs_set_avc_log_spoofing(void **a) { return 0; }
          static inline int susfs_get_enabled_features(void **a) { return 0; }
          static inline int susfs_show_variant(void **a) { return 0; }
          static inline int susfs_show_version(void **a) { return 0; }
          static inline int susfs_enable_log(void **a) { return 0; }
          #if LINUX_VERSION_CODE < KERNEL_VERSION(5, 10, 0)
          void ksu_selinux_hide_handle_post_fs_data(void) { }
          void ksu_selinux_hide_handle_second_stage(void) { }
          void ksu_selinux_hide_init(void) { }
          void ksu_selinux_hide_exit(void) { }
          void ksu_selinux_hide_drop_backup_if_unused(void) { }
          #endif
          #endif
          SUSFS_EOF

          # 将 SUSFS 添加到 fs/Makefile
          grep -q 'susfs' fs/Makefile || \
            sed -i '/obj-$(CONFIG_EPOLL)/i\obj-$(CONFIG_KSU_SUSFS) += susfs.o' fs/Makefile

          # 添加 path_umount 声明到 fs/internal.h
          grep -q 'susfs' fs/internal.h || \
            sed -i '/^extern void __mnt_drop_write_file/i\#ifdef CONFIG_KSU_SUSFS\nextern int path_umount(struct path *path, int flags);\n#endif' fs/internal.h

          # 添加 SUSFS 钩子到 fs/namei.c
          grep -q 'susfs' fs/namei.c || \
            sed -i '/^#include "mount.h"/a\#ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' fs/namei.c

      - name: Fix KSU 4.4 kernel compatibility
        run: |
          cd kernel

          # 1) current_sid() 在 4.4 内核不可用（security_task_getsecid 替代）
          sed -i 's/return current_sid();/u32 sid; security_task_getsecid(current, \&sid); return sid;/' \
            drivers/kernelsu/selinux/selinux.c 2>/dev/null || true
          sed -i 's/current_sid()/susfs_get_current_sid()/g' \
            drivers/kernelsu/selinux/selinux.c 2>/dev/null || true

          # 2) access_ok 在 4.4 是 3 参数宏，KPM 代码用 2 参数
          # ksu_access_ok() 已经在 kernel_compat.h 里有兼容封装
          sed -i 's/!access_ok(/!ksu_access_ok(/g' drivers/kernelsu/kpm/kpm.c 2>/dev/null || true
          sed -i 's/!access_ok(/!ksu_access_ok(/g' drivers/kernelsu/kpm/super_access.c 2>/dev/null || true

          # 3) task_struct->security 在 4.4 不存在
          grep -q 'LINUX_VERSION_CODE.*4\.19' drivers/kernelsu/kpm/super_access.c || \
            sed -i 's/DEFINE_MEMBER(task_struct, security)/#if LINUX_VERSION_CODE >= KERNEL_VERSION(4, 19, 0)\nDEFINE_MEMBER(task_struct, security)\n#endif/' \
              drivers/kernelsu/kpm/super_access.c

          # 4) C99 for-loop 声明需要 -std=gnu99（4.4 默认 gnu89）
          grep -q 'std=gnu99' drivers/kernelsu/Makefile || \
            echo 'ccflags-y += -std=gnu99' >> drivers/kernelsu/Makefile

          # 5) strncpy_from_user_nofault 4.4 不存在（用 ksu 封装的版本）
          # SukiSU builtin 分支部分行已有 ksu_ 前缀，部分没有，需全量替换+清理双前缀
          sed -i 's/strncpy_from_user_nofault(/ksu_strncpy_from_user_nofault(/g; s/ksu_ksu_/ksu_/g' \
            drivers/kernelsu/sulog/event.c

          # 6) copy_to_iter 在 4.4 需要非 const 指针
          sed -i 's/kernel_su_rc + ksu_rc_pos/(void *)(KERNEL_SU_RC + ksu_rc_pos)/' \
            drivers/kernelsu/runtime/ksud.c 2>/dev/null || true

      - name: Fix set_memory.h compat for kernel 4.4
        run: |
          cd kernel
          sed -i '\|^#include <linux/set_memory.h>|d' \
            drivers/kernelsu/kpm/kpm.c \
            drivers/kernelsu/kpm/compact.c \
            drivers/kernelsu/kpm/super_access.c

      - name: Fix KSU LSM hook for SUSFS mode (KSU Manager fd)
        run: |
          cd kernel
          # When CONFIG_KSU_SUSFS=y, task_fix_setuid is gated out.
          # Fix: remove the #ifndef/#endif guards and move function def.
          # Step 1: Remove #ifndef CONFIG_KSU_SUSFS .. #endif around hook
          sed -i '/#ifndef CONFIG_KSU_SUSFS/,/^#endif/{/^#endif/d;/#ifndef CONFIG_KSU_SUSFS/d}' \
            SukiSU-Ultra/kernel/hook/lsm_hook.c
          # Step 2: Move ksu_task_fix_setuid out of #else block
          sed -i '/^#else$/{N;/static int ksu_task_fix_setuid/{s/^#else\n/#endif\n/}}' \
            SukiSU-Ultra/kernel/hook/lsm_hook.c
          # Step 3: Remove the extra #endif that was the original closing of #ifdef CONFIG_KSU_SUSFS
          # (between ksu_task_fix_setuid body end and ksu_hooks definition)
          sed -i '/^static int ksu_task_fix_setuid/,/^static struct security_hook_list/{/^#endif$/d}' \
            SukiSU-Ultra/kernel/hook/lsm_hook.c

      - name: Add kprobe hook for sys_reboot supercall (non-GKI connector)
        run: |
          cd kernel
          # Create kprobe_hook.c
          cat > SukiSU-Ultra/kernel/kprobe_hook.c << 'KPROBE_EOF'
          // SPDX-License-Identifier: GPL-2.0-only
          #include <linux/kprobes.h>
          #include <linux/version.h>
          #include <linux/syscalls.h>
          #include "include/uapi/supercall.h"
          extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);
          static int ksu_sys_reboot_pre_handler(struct kprobe *p, struct pt_regs *regs)
          {
          #ifdef CONFIG_ARM64
              int magic1 = (int)regs->regs[0];
              if (magic1 != KSU_INSTALL_MAGIC1) return 0;
              int magic2 = (int)regs->regs[1];
              unsigned int cmd = (unsigned int)regs->regs[2];
              void __user *arg = (void __user *)regs->regs[3];
              ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);
              regs->regs[0] = 0;
              regs->pc = regs->regs[30];
              return 1;
          #else
              return 0;
          #endif
          }
          static struct kprobe ksu_reboot_kp = {
              .symbol_name = "sys_reboot",
              .pre_handler = ksu_sys_reboot_pre_handler,
          };
          int __init ksu_kprobe_hook_init(void)
          {
              int ret = register_kprobe(&ksu_reboot_kp);
              if (ret < 0) { ksu_reboot_kp.symbol_name = "SyS_reboot"; ret = register_kprobe(&ksu_reboot_kp); }
              if (ret < 0) { ksu_reboot_kp.symbol_name = "__arm64_sys_reboot"; ret = register_kprobe(&ksu_reboot_kp); }
              if (ret == 0) pr_info("ksu: kprobe hook on %s\n", ksu_reboot_kp.symbol_name);
              else pr_err("ksu: kprobe hook failed\n");
              return ret;
          }
          void __exit ksu_kprobe_hook_exit(void) { unregister_kprobe(&ksu_reboot_kp); }
          KPROBE_EOF
          # Add include and init call
          sed -i '/^#include "infra\/kernel_compat.c"/a#include "kprobe_hook.c"' SukiSU-Ultra/kernel/ksu.c
          sed -i '/ksu_file_wrapper_init();/a\    ksu_kprobe_hook_init();' SukiSU-Ultra/kernel/ksu.c
          echo "kprobe_hook integrated"

      - name: Fix missing vendor header include paths
        run: |
          cd kernel
          # 1) Bluetooth
          grep -q 'ccflags-y.*-I.*drivers/bluetooth' drivers/bluetooth/Makefile || \
            sed -i '/^ccflags-y.*-D__CHECK_ENDIAN__/a ccflags-y += -I$(srctree)\/drivers\/bluetooth' drivers/bluetooth/Makefile
          # 2) Sound
          grep -q 'ccflags-y.*-I.*sound/soc/msm' sound/soc/msm/Makefile || \
            sed -i '/^# for MSM8996 sound card driver/i\ccflags-y += -I$(srctree)\/sound\/soc\/msm' sound/soc/msm/Makefile
          # 3) KGSL
          grep -q 'ccflags-y.*-I.*drivers/gpu/msm' drivers/gpu/msm/Makefile || \
            sed -i '/^ccflags-y := -Idrivers\/staging\/android/s|$| -I$(srctree)/drivers/gpu/msm|' drivers/gpu/msm/Makefile
          # 4) vl53L0 (ToF sensor) - 注意: 不要匹配到已有 vl53L0/inc 行
          grep -q 'ccflags-y += -Idrivers/input/misc/vl53L0$' drivers/input/misc/vl53L0/Makefile || \
            sed -i '/^ccflags-y.*vl53L0\/inc -DCAMERA_CCI/a\ccflags-y += -Idrivers/input/misc/vl53L0' drivers/input/misc/vl53L0/Makefile 2>/dev/null || true
          # 5) mhi (Modem Host Interface) <mhi_sys.h> 在同目录
          grep -q 'ccflags-y.*-I.*drivers/platform/msm/mhi' drivers/platform/msm/mhi/Makefile || \
            sed -i '1s/^/ccflags-y += -I$(srctree)\/drivers\/platform\/msm\/mhi\n/' drivers/platform/msm/mhi/Makefile
          # 6) soc/qcom: tracer_pkt.c 用 TRACE_INCLUDE_PATH=. 引用同目录头文件
          grep -q 'ccflags-y.*-I.*drivers/soc/qcom' drivers/soc/qcom/Makefile || \
            echo 'ccflags-y += -I$(srctree)/drivers/soc/qcom' >> drivers/soc/qcom/Makefile
          # 7) IPA v2: 同目录 ipa_trace.h 用 TRACE_INCLUDE_PATH=. 引用
          grep -q 'ccflags-y.*-I.*drivers/platform/msm/ipa/ipa_v2' drivers/platform/msm/ipa/ipa_v2/Makefile || \
            echo 'ccflags-y += -I$(srctree)/drivers/platform/msm/ipa/ipa_v2' >> drivers/platform/msm/ipa/ipa_v2/Makefile
          # 8) Camera sensor/io: msm_sensor.h 用 #include "msm_camera_i2c.h" 引用同目录头文件
          grep -q 'ccflags-y.*-I.*camera_v2/sensor/io' drivers/media/platform/msm/camera_v2/sensor/io/Makefile || \
            echo 'ccflags-y += -Idrivers/media/platform/msm/camera_v2/sensor/io' >> drivers/media/platform/msm/camera_v2/sensor/io/Makefile
          # 9) IPA v3: ipa_trace.h 用 TRACE_INCLUDE_PATH=. 引用
          grep -q 'ccflags-y.*-I.*ipa/ipa_v3' drivers/platform/msm/ipa/ipa_v3/Makefile || \
            echo 'ccflags-y += -I$(srctree)/drivers/platform/msm/ipa/ipa_v3' >> drivers/platform/msm/ipa/ipa_v3/Makefile
          # 10) qcacld-3.0 WiFi: 去掉 -Werror（4.4 驱动在 GCC 9 下太多警告）
          grep -q 'Wno-error' drivers/staging/qcacld-3.0/Kbuild || \
            sed -i 's/-Werror/-Wno-error/' drivers/staging/qcacld-3.0/Kbuild
          # 11) Camera common: cam_smmu_api.c 需要 <msm_camera_tz_util.h>（同目录）
          grep -q 'ccflags-y.*-I.*camera_v2/common' drivers/media/platform/msm/camera_v2/common/Makefile || \
            echo 'ccflags-y += -I$(srctree)/drivers/media/platform/msm/camera_v2/common' >> drivers/media/platform/msm/camera_v2/common/Makefile
          # 12) Camera ISP: trace/events/msm_cam.h 用 #include "msm_isp.h" 引用同目录（trace/events/ 找不到，需 -I 到 isp/）
          grep -q 'ccflags-y.*-I.*camera_v2/isp' drivers/media/platform/msm/camera_v2/isp/Makefile || \
            sed -i '1s/^/ccflags-y += -I$(srctree)\/drivers\/media\/platform\/msm\/camera_v2\/isp\n/' drivers/media/platform/msm/camera_v2/isp/Makefile
          # 13) rndis_ipa: rndis_ipa_trace.h 用 TRACE_INCLUDE_PATH=. 引用（drivers/net/ethernet/msm）
          grep -q 'ccflags-y.*-I.*drivers/net/ethernet/msm' drivers/net/ethernet/msm/Makefile || \
            echo 'ccflags-y += -I$(srctree)/drivers/net/ethernet/msm' >> drivers/net/ethernet/msm/Makefile

      - name: Configure KPM + SUSFS
        run: |
          cd kernel

          # 使用 sagit defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- sagit_defconfig

          # 追加 KPM / SUSFS / KALLSYMS 配置
          cat >> .config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KPM=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

          # 更新配置（让依赖选项自动调整）
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

          # 关闭 CC_WERROR（完全取消定义，使 ifdef CONFIG_CC_WERROR 不生效）
          scripts/config --file .config --disable CC_WERROR

      - name: Verify KPM enabled
        run: |
          cd kernel
          echo "=== KPM ==="
          grep CONFIG_KPM .config
          echo "=== KSU ==="
          grep CONFIG_KSU .config

      - name: Build kernel
        run: |
          cd kernel
          make -j$(nproc) ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf-

      - name: Show build results
        run: |
          echo "=== 编译产物 ==="
          ls -la kernel/arch/arm64/boot/
          cat kernel/arch/arm64/boot/.version 2>/dev/null || true

      - name: Package boot.img
        run: |
          cd kernel

          # 下载 AnyKernel3 模板
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel3

          # 复制内核
          cp arch/arm64/boot/Image.gz-dtb anykernel3/ 2>/dev/null || \
          cp arch/arm64/boot/Image.gz anykernel3/ 2>/dev/null || \
          cp arch/arm64/boot/Image anykernel3/

          # 配置设备名
          cat > anykernel3/anykernel.sh << 'SH'
          kernel.string=Sagit KPM Kernel @ build
          device.name1=sagit
          device.name2=Mi 6
          device.name3=
          device.name4=
          device.name5=
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=0;
          ramdisk_compression=auto;
          SH

          # 打包
          cd anykernel3
          zip -r9 ../sagit-kpm-anykernel3.zip * -x .git README.md
          cd ..

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: sagit-kpm-boot-img
          path: kernel/arch/arm64/boot/Image.gz-dtb

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: sagit-kpm-anykernel3
          path: kernel/sagit-kpm-anykernel3.zip

      - name: Upload kernel config
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config
          path: kernel/.config
